name: Publish pip package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history for version detection

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Build wheel and sdist
        run: |
          uv build

      - name: Publish to GitHub Packages (PyPI-compatible registry)
        run: |
          uv publish \
            --index-url https://upload.pypi.org/legacy/ \
            --token ${{ secrets.PYPI_TOKEN }}
        # Note: swap for GitHub Packages URL when using that registry:
        # --index-url https://pypi.pkg.github.com/ppatel-skillsoft/
        # --token ${{ secrets.GITHUB_TOKEN }}

      - name: Verify package installs from git tag
        run: |
          pip install "git+https://github.com/ppatel-skillsoft/openkb-core@${{ github.ref_name }}"
          openkb --help
